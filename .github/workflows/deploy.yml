name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the latest code onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js on the GitHub runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Build the Frontend ON GITHUB (Not EC2 - saves EC2 RAM)
      - name: Install Dependencies and Build Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build
        # It will automatically use the .env.production file we added to the repo for the EC2 IP

      # 4. Copy the entire codebase + built dist folder to EC2
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "./*"
          target: "~/Edupredict"
          overwrite: true

      # 5. SSH into EC2 to restart the backend and serve the frontend
      - name: Restart Services on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # ── A. Ensure Python + PM2 are installed on EC2 ────────────────
            sudo apt-get install -y python3 python3-venv python3-pip --no-install-recommends
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            export PATH=$PATH:/usr/bin:/usr/local/bin

            # ── B. Backend: Python / Flask ─────────────────────────────────
            cd ~/Edupredict/server/backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            # Only install Python dependencies (much lighter on RAM)
            pip install -r requirements.txt --quiet
            deactivate

            pm2 restart backend 2>/dev/null || \
              pm2 start app.py \
                --name "backend" \
                --interpreter ~/Edupredict/server/backend/venv/bin/python3 \
                --cwd ~/Edupredict/server/backend

            # ── C. Frontend: Serve the PRE-BUILT dist folder ──────────────
            cd ~/Edupredict
            pm2 restart frontend 2>/dev/null || \
              pm2 serve dist/ 3000 --name "frontend" --spa

            # ── D. Save PM2 state ──────────────────────────────────────────
            pm2 save
