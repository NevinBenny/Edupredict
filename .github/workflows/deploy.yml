name: Build and Deploy to EC2 with Nginx & Systemd

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies and Build Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "./*"
          target: "~/Edupredict"
          overwrite: true

      - name: Purge PM2 & Setup Systemd/Nginx on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # ── 1. Purge PM2 (Cleanup) ────────────────────────────────────
            echo "Purging PM2..."
            pm2 delete all 2>/dev/null || true
            pm2 kill 2>/dev/null || true
            sudo npm uninstall -g pm2 2>/dev/null || true
            rm -rf ~/.pm2

            # ── 2. Ensure Dependencies are installed ──────────────────────
            sudo apt-get update -y
            sudo apt-get install -y nginx python3 python3-venv python3-pip --no-install-recommends

            # ── 3. Configure Nginx ─────────────────────────────────────────
            sudo rm -rf /var/www/edupredict
            sudo cp -r ~/Edupredict/dist /var/www/edupredict
            sudo chown -R www-data:www-data /var/www/edupredict
            sudo chmod -R 755 /var/www/edupredict
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo cp ~/Edupredict/nginx/edupredict.conf /etc/nginx/sites-available/edupredict
            sudo ln -sf /etc/nginx/sites-available/edupredict /etc/nginx/sites-enabled/edupredict
            sudo systemctl restart nginx

            # ── 4. Setup Python Virtual Environment ────────────────────────
            cd ~/Edupredict/server/backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            deactivate

            # ── 5. Configure Systemd Service ──────────────────────────────
            echo "Configuring Systemd service..."
            sudo cp ~/Edupredict/systemd/edupredict.service /etc/systemd/system/edupredict.service
            sudo systemctl daemon-reload
            sudo systemctl enable edupredict
            sudo systemctl restart edupredict

            echo "Deployment Successful! App is running as a Systemd service."
