name: Build and Deploy to EC2 with Nginx

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies and Build Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "./*"
          target: "~/Edupredict"
          overwrite: true

      - name: Setup Nginx & Backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # ── A. Ensure Nginx, Python + PM2 are installed ────────────────
            sudo apt-get update -y
            sudo apt-get install -y nginx python3 python3-venv python3-pip --no-install-recommends
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            export PATH=$PATH:/usr/bin:/usr/local/bin

            # ── B. Clean Up Old "Frontend" PM2 Process (Prevents Collisions)
            pm2 delete frontend 2>/dev/null || true

            # ── C. Configure Nginx ─────────────────────────────────────────
            # Move the frontend build to the standard /var/www folder giving Nginx permissions
            sudo rm -rf /var/www/edupredict
            sudo cp -r ~/Edupredict/dist /var/www/edupredict
            sudo chown -R www-data:www-data /var/www/edupredict
            sudo chmod -R 755 /var/www/edupredict

            # Remove the default nginx config to prevent port 80 collisions
            sudo rm -f /etc/nginx/sites-enabled/default

            # Copy our custom Nginx config from the repo
            sudo cp ~/Edupredict/nginx/edupredict.conf /etc/nginx/sites-available/edupredict
            
            # Enable the site
            sudo ln -sf /etc/nginx/sites-available/edupredict /etc/nginx/sites-enabled/edupredict
            
            # Test & Restart Nginx
            sudo nginx -t
            sudo systemctl restart nginx

            # ── D. Restart Backend: Python / Flask ─────────────────────────
            cd ~/Edupredict/server/backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            # Only install Python dependencies (much lighter on RAM)
            pip install -r requirements.txt --quiet
            deactivate

            # Aggressively kill any existing backend processes to clear sticky config
            pm2 delete backend 2>/dev/null || true
            pm2 kill || true 
            
            # Start backend using a single command string (more reliable with some PM2 versions)
            pm2 start "venv/bin/python3 app.py" --name "backend" --cwd ~/Edupredict/server/backend

            # ── E. Save PM2 state ──────────────────────────────────────────
            pm2 save
