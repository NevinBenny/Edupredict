name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu # Default for Ubuntu EC2 instances
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Update Node.js to v22 (fixes the Vite EBADENGINE error)
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs python3-venv
            
            # 2. Install PM2 globally (fixes "pm2: command not found")
            sudo npm install -g pm2
            
            # Make sure pm2 is in the current SSH shell PATH
            export PATH=$PATH:/usr/bin:/usr/local/bin
            
            # 3. Navigate to your repo (the one you cloned manually with your .env)
            cd ~/Edupredict
            
            # Pull the latest code
            git pull origin main
            
            # --- BACKEND ---
            cd server/backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip3 install -r requirements.txt
            
            # Restart backend using PM2
            pm2 restart backend || pm2 start app.py --name "backend" --interpreter python3
            
            # --- FRONTEND ---
            cd ../..
            npm install
            npm run build
            
            # Restart frontend
            pm2 restart frontend || pm2 serve dist/ 3000 --name "frontend" --spa

